<!DOCTYPE html>
<html lang="es" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JONATHAN RANGEL · Inversiones Guicar 2025 · Pinturas al Frío</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/theme.js"></script>
</head>
<body class="bg-black text-white selection:bg-[var(--color-primary)]/30">

    <!-- ORBES DE FONDO -->
    <div class="bg-glow-orb w-[600px] h-[600px] -top-40 -left-40" style="background: rgba(255, 165, 0, 0.25); filter: blur(90px);"></div>
    <div class="bg-glow-orb w-[700px] h-[700px] bottom-0 right-0" style="background: rgba(139, 92, 246, 0.2); filter: blur(90px);"></div>
    <div class="bg-glow-orb w-[500px] h-[500px] top-1/3 left-1/2 -translate-x-1/2" style="background: rgba(59, 130, 246, 0.15); filter: blur(90px);"></div>

    <!-- HEADER -->
    <header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-2xl border-b border-white/5">
        <div class="flex flex-col items-center justify-center py-4 px-6 relative max-w-7xl mx-auto">
            <img src="https://raw.githubusercontent.com/JJRB47/JJRB47/main/assets/logo-jrb.png" 
                 alt="Logo Jonathan Rangel" 
                 class="w-14 h-14 rounded-full object-contain bg-white/5 p-1.5 border-2 border-white/20"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="w-14 h-14 rounded-full gradient-neon flex items-center justify-center text-xs font-bold text-black shadow-lg" style="display:none;">JR</div>

            <h1 class="text-2xl font-bold tracking-[2px] text-white/90 uppercase leading-tight mt-2">
                JONATHAN JOSE RANGEL BETANCOURT
            </h1>
            <!-- Subtítulo con verde fijo -->
            <span class="text-base md:text-xl text-neon-green font-bold tracking-wider uppercase">
                Inversiones Guicar · Pinturas al Frío
            </span>

            <div class="absolute right-4 top-4 flex items-center gap-3">
                <button onclick="goToMainSite()" class="group p-3 rounded-2xl glass hover:bg-white/10 transition-all duration-300" aria-label="Ir a página principal">
                    <i data-lucide="home" class="w-5 h-5 text-white/80 group-hover:scale-110 transition-transform"></i>
                </button>
                <button onclick="openCart()" class="group relative p-3 rounded-2xl glass hover:bg-white/10 transition-all duration-300">
                    <i data-lucide="shopping-bag" class="w-5 h-5 text-white/80 group-hover:scale-110 transition-transform"></i>
                    <span id="cartBadge" class="hidden absolute -top-1.5 -right-1.5 w-5 h-5 badge-neon text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-black">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="relative z-10 pt-40 pb-28 px-6 max-w-7xl mx-auto">
        <div id="categoriesView">
            <div id="categoryGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-8 max-w-2xl mx-auto"></div>
        </div>

        <div id="productsView" class="hidden">
            <button onclick="goBack()" class="flex items-center gap-2 glass px-5 py-2.5 rounded-2xl text-xs font-medium tracking-wide uppercase mb-10 hover:bg-white/10 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver
            </button>
            <div id="productsContent"></div>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cartOverlay" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500" onclick="closeCart()"></div>

    <div id="cartPanel" class="fixed top-0 right-0 bottom-0 z-[70] w-full max-w-md cart-panel closed bg-zinc-950/95 backdrop-blur-3xl border-l border-white/10 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center px-8 py-8">
            <div>
                <h2 class="text-2xl font-light tracking-tight text-white">Tu <span class="font-bold text-neon-green">Pedido</span></h2>
                <p class="text-xs text-zinc-500 mt-1 uppercase tracking-widest" id="cartCount">(0 envases)</p>
            </div>
            <button onclick="closeCart()" class="p-3 rounded-2xl bg-white/5 hover:bg-white/10 text-zinc-400 hover:text-white transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-8 space-y-4" id="cartItems"></div>

        <div id="cartEmpty" class="flex-1 flex flex-col items-center justify-center text-center p-12">
            <div class="w-20 h-20 rounded-full bg-zinc-900 flex items-center justify-center mb-6">
                <i data-lucide="shopping-cart" class="w-8 h-8 text-zinc-700"></i>
            </div>
            <p class="text-zinc-500 font-medium">Carrito vacío</p>
            <p class="text-zinc-600 text-xs mt-2">Agrega colores (múltiplos de 3 envases)</p>
        </div>

        <div id="cartFooter" class="hidden border-t border-white/5 p-8 bg-black/40">
            <div id="cartSummaryLines" class="flex flex-wrap gap-2 mb-6"></div>
            <div class="space-y-3">
                <button onclick="sendWhatsApp()" class="w-full btn-whatsapp py-4 rounded-2xl font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-3">
                    <i data-lucide="message-circle" class="w-5 h-5"></i> Enviar por WhatsApp
                </button>
                <button onclick="openClearModal()" class="w-full py-4 rounded-xl text-sm md:text-base font-bold uppercase tracking-wider text-zinc-500 hover:text-[var(--color-primary)] transition-colors">
                    Vaciar Carrito
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="clearModal" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeClearModal()"></div>
        <div class="relative bg-zinc-900/90 border border-[var(--color-primary)]/30 rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl shadow-[var(--color-primary)]/10 transform scale-95 transition-transform duration-300 modal-card">
            <div class="text-center">
                <div class="w-16 h-16 rounded-full bg-[var(--color-primary)]/10 flex items-center justify-center mx-auto mb-5">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-[var(--color-primary)]"></i>
                </div>
                <h3 class="text-xl font-bold text-white tracking-tight mb-2">¿Vaciar todo el carrito?</h3>
                <p class="text-zinc-400 text-sm leading-relaxed">Esta acción eliminará todos los productos de tu pedido. ¿Estás seguro?</p>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeClearModal()" class="flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-zinc-300 font-medium text-sm transition-colors">Cancelar</button>
                <button onclick="confirmClearCart()" class="flex-1 py-3 rounded-xl bg-[var(--color-primary)] hover:bg-[var(--color-secondary)] text-black font-bold text-sm transition-all shadow-lg shadow-[var(--color-primary)]/30 hover:shadow-[var(--color-secondary)]/40">Sí, vaciar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        function goToMainSite() {
            window.location.href = "https://jjrb47.github.io/JJRB47/";
        }
        // Ajuste dinámico del padding del body según altura del header
        function adjustHeaderPadding() {
            const header = document.querySelector('header');
            if (header) {
                const altura = header.offsetHeight;
                document.body.style.paddingTop = altura + 'px';
                document.querySelector('main').style.minHeight = `calc(100vh - ${altura}px)`;
            }
        }
        document.addEventListener('DOMContentLoaded', adjustHeaderPadding);
        window.addEventListener('resize', adjustHeaderPadding);
    </script>
</body>
</html>
